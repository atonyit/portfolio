<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Alan Tony-Itoyah</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0d0d0d;
        color: #f0ece0;
        font-family: 'Syne', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .num {
        font-size: clamp(6rem, 20vw, 12rem);
        font-weight: 800;
        color: transparent;
        -webkit-text-stroke: 2px #ff6b35;
        line-height: 1;
      }

      .msg {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        color: #666;
        letter-spacing: 0.1em;
      }

      .link {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
        background: #ff6b35;
        text-decoration: none;
        padding: 0.9rem 1.75rem;
        border-radius: 12px;
        margin-top: 0.5rem;
        transition: background 0.2s;
      }

      .link:hover { background: #ff4d0f; }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="num">404</span>
      <p class="msg">// this page doesn't exist</p>
      <a href="/" class="link">Go home →</a>
    </div>
  </body>
</html>
